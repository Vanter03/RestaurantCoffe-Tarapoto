            text-align: center;
        }

        .hero {
            background-image: url('https://images.unsplash.com/photo-1555992336-03a23c7b20ee');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 180px 90px;
            text-align: center;
        }

        .hero h2 {
            font-size: 40px;
        }

        .hero p {
            font-size: 20px;
        }

        @media (max-width: 768px) {
            nav {
                flex-direction: column;

            }

            .hero h2 {
